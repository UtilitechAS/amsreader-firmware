[platformio]
extra_configs = platformio-user.ini

[common]
lib_deps = EEPROM, LittleFS, DNSServer, 256dpi/MQTT@2.5.2, OneWireNg@0.13.3, DallasTemperature@4.0.4, https://github.com/gskjold/RemoteDebug.git, PaulStoffregen/Time@1.6.1, JChristensen/Timezone@1.2.4
lib_ignore = OneWire
extra_scripts =
    pre:scripts/addversion.py
    pre:scripts/generate_includes.py
build_flags =
    -D WEBSOCKET_DISABLED=1
    -D NO_AMS2MQTT_PRICE_KEY
    -D NO_AMS2MQTT_PRICE_AUTHENTICATION
    -D NO_AMS2MQTT_SC_KEY
    -D NO_ENERGY_SPEEDOMETER_USER
    -D NO_ENERGY_SPEEDOMETER_PASS
    -fexceptions
    -I src/decoder/include
    -I src/webserver
    -I src/mqtt
    -I src/cloud

[esp32]
lib_deps = WiFi, Ethernet, ESPmDNS, WiFiClientSecure, HTTPClient, FS, WebServer, ESP32 Async UDP, ESP32SSDP, mulmer89/ESPRandom@1.5.0, ${common.lib_deps}, bblanchon/ArduinoJson@7.0.4

[env:esp8266]
platform = espressif8266@4.2.1
framework = arduino
board = esp12e
board_build.ldscript = eagle.flash.4m2m.ld
build_flags = ${common.build_flags} -D AMS_REMOTE_DEBUG=1
build_src_filter = +<*> -<cloud/>
lib_deps = ESP8266WiFi, ESP8266mDNS, ESP8266WebServer, ESP8266HTTPClient, ESP8266httpUpdate, ESP8266SSDP, EspSoftwareSerial@8.2.0, ${common.lib_deps}
lib_ignore = ${common.lib_ignore}
extra_scripts = ${common.extra_scripts}

[env:esp32]
platform = https://github.com/tasmota/platform-espressif32/releases/download/2023.07.00/platform-espressif32.zip
framework = arduino
board = esp32dev
board_build.f_cpu = 160000000L
board_build.partitions = custom_partition.csv
build_flags =
    ${common.build_flags}
    -D AMS_REMOTE_DEBUG=1
    -D AMS_CLOUD=1
    -D AMS_KMP=1
    -D ZMART_CHARGE=1
    -L precompiled/esp32
    -lKmpTalker
lib_deps = ${esp32.lib_deps}
lib_ignore = ${common.lib_ignore}
extra_scripts = ${common.extra_scripts}

# Tasmota has pre-built platform for C3, S2, S3 and Solo, more information at:
# https://github.com/Jason2866/esp32-arduino-lib-builder

[env:esp32s2]
platform = https://github.com/tasmota/platform-espressif32/releases/download/2023.07.00/platform-espressif32.zip
framework = arduino
board = esp32-s2-saola-1
board_build.mcu = esp32s2
board_build.variant = esp32s2
board_build.flash_mode = qio
board_build.f_cpu = 160000000L
board_build.f_flash = 40000000L
board_build.partitions = custom_partition.csv
build_flags =
    ${common.build_flags}
    -D AMS_REMOTE_DEBUG=1
    -D AMS_CLOUD=1
    -D AMS_KMP=1
    -D ZMART_CHARGE=1
    -L precompiled/esp32s2
    -lKmpTalker
lib_deps = ${esp32.lib_deps}
lib_ignore = ${common.lib_ignore}
extra_scripts = ${common.extra_scripts}

# ESP32-S2 with PSRAM (e.g. Wemos S2 Mini, ESP32-S2FNR2 with 2MB PSRAM).
# Dev-only target — NOT the production Pow-U hardware (which uses S2FH4
# without PSRAM and must continue using the [env:esp32s2] target).
# Uses lolin_s2_mini board profile which enables BOARD_HAS_PSRAM and
# ARDUINO_USB_CDC_ON_BOOT, so Serial output flows over USB-OTG.
[env:esp32s2psram]
platform = https://github.com/tasmota/platform-espressif32/releases/download/2023.07.00/platform-espressif32.zip
framework = arduino
board = lolin_s2_mini
board_build.partitions = custom_partition.csv
build_flags =
    ${common.build_flags}
    -D AMS_REMOTE_DEBUG=1
    -D AMS_CLOUD=1
    -D AMS_KMP=1
    -D ZMART_CHARGE=1
    -L precompiled/esp32s2
    -lKmpTalker
lib_deps = ${esp32.lib_deps}
lib_ignore = ${common.lib_ignore}
extra_scripts = ${common.extra_scripts}

[env:esp32solo]
platform = https://github.com/tasmota/platform-espressif32/releases/download/2023.07.00/platform-espressif32.zip
framework = arduino
board = esp32-solo1
board_build.f_cpu = 160000000L
board_build.partitions = custom_partition.csv
build_flags =
    ${common.build_flags}
    -DFRAMEWORK_ARDUINO_SOLO1
    -D AMS_REMOTE_DEBUG=1
    -D AMS_CLOUD=1
    -D AMS_KMP=1
    -D ZMART_CHARGE=1
    -L precompiled/esp32
    -lKmpTalker
lib_deps = ${esp32.lib_deps}
lib_ignore = ${common.lib_ignore}
extra_scripts = ${common.extra_scripts}

[env:esp32c3]
platform = https://github.com/tasmota/platform-espressif32/releases/download/2023.07.00/platform-espressif32.zip
framework = arduino
board = esp32-c3-devkitm-1
board_build.mcu = esp32c3
board_build.partitions = custom_partition.csv
build_flags =
    ${common.build_flags}
    -D AMS_REMOTE_DEBUG=1
    -D AMS_CLOUD=1
    -D AMS_KMP=1
    -D ZMART_CHARGE=1
    -L precompiled/esp32c3
    -lKmpTalker
lib_deps = ${esp32.lib_deps}
lib_ignore = ${common.lib_ignore}
extra_scripts = ${common.extra_scripts}

[env:esp32s3]
platform = https://github.com/tasmota/platform-espressif32/releases/download/2023.07.00/platform-espressif32.zip
framework = arduino
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
build_flags =
    ${common.build_flags}
    -D AMS_REMOTE_DEBUG=1
    -D AMS_CLOUD=1
    -D AMS_KMP=1
    -D ZMART_CHARGE=1
    -L precompiled/esp32s3
    -lKmpTalker
lib_deps = ${esp32.lib_deps}
lib_ignore = ${common.lib_ignore}
extra_scripts = ${common.extra_scripts}

[env:native]
platform = native
build_flags =
    -D NATIVE_TEST
    -I src/decoder/include
    -I src
    -I test/stubs
    -std=c++17
test_framework = unity
test_filter = test_decoder
build_src_filter =
    -<*>
    +<decoder/src/HdlcParser.cpp>
    +<decoder/src/MbusParser.cpp>
    +<decoder/src/LlcParser.cpp>
    +<decoder/src/GbtParser.cpp>
    +<decoder/src/DlmsParser.cpp>
    +<decoder/src/DsmrParser.cpp>
    +<decoder/src/Cosem.cpp>
    +<decoder/src/crc.cpp>
    +<decoder/src/ntohll.cpp>
    +<decoder/src/IEC6205675.cpp>
    +<decoder/src/IEC6205621.cpp>
    +<hexutils.cpp>
    +<AmsData.cpp>
    +<AmsConfiguration.cpp>
